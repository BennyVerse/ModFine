<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModFine</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    /* --- Hintergrundvideo --- */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* --- Navbar --- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: rgba(44, 62, 80, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      backdrop-filter: blur(5px);
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 30px;
      font-weight: bold;
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      transition: color 0.2s;
    }

    .navbar a:hover {
      color: #12e6c9;
    }

    /* --- Inhalt & Controls --- */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      padding-top: 400px;
      font-size: 23px;
    }

    .controls {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      margin-top: 300px;
      transform: scale(1.2);
      position: relative;
      font-family: 'Press Start 2P', monospace;
    }

    .controls input,
    .controls select,
    .controls button {
      padding: 10px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    .controls input {
      width: 350px;
    }

    .controls button {
      background-color: #c41616;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .controls button:hover {
      background-color: #de6007;
    }

    input, select, button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #34495e;
      color: #ecf0f1;
    }

    button {
      background-color: #e74c3c;
      cursor: pointer;
    }

    button:hover {
      background-color: #c0392b;
    }

    /* --- Mod-Ergebnisse --- */
    #mod-results {
      position: absolute;
      top: 380px;
      left: 960px;
      transform: translateX(-50%);
      width: 1000px;
      max-height: 500px;
      overflow-y: auto;
      background-color: #2c3e50;
      color: #ffffff;
      border-radius: 5px;
      z-index: 10;
      padding: 0;
      font-family: 'Press Start 2P', monospace;
    }

    .result {
      padding: 12px;
      cursor: pointer;
    }

    .result:hover {
      background-color: #3d566e;
    }

    /* --- Overlay --- */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }

    /* --- Warnmeldung --- */
    #alert-box {
      position: absolute;
      top: 150px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(214, 47, 47, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      display: none;
      z-index: 20;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>

<body>
  <!-- Hintergrundvideo -->
  <video id="bg-video" autoplay muted loop>
    <source src="files/galaxy.mp4" type="video/mp4">
    Dein Browser unterstützt kein HTML5-Video.
  </video>

  <div id="overlay"></div>

  <!-- Navbar -->
  <div class="navbar">
    <a href="main.html">Home</a>
    <a href="mod.html">Mod Downloader</a>
    <a href="#modpack">Modpack Downloader</a>
    <a onclick="window.open('https://modrinth.com/')">Modrinth</a>
  </div>

  <div id="alert-box"></div>

  <!-- Suchcontainer -->
  <div class="container">
    <div class="controls">
      <input id="mod-input" type="text" placeholder="Modname eingeben..." autocomplete="off">
      <select id="version"></select>
      <select id="modloader">
        <option value="forge">Forge</option>
        <option value="fabric">Fabric</option>
        <option value="quilt">Quilt</option>
        <option value="neoforge">NeoForge</option>
      </select>

      <button onclick="redirectToUrl()">Download</button>

      <button onclick="
        const modname = document.getElementById('mod-input').value.trim();
        if (!modname) {
          showAlert('⚠️ Bitte gib eine Mod ein!');
        } else {
          window.open('https://modrinth.com/mod/' + encodeURIComponent(modname.toLowerCase()), '_blank');
        }
      ">Modpage</button>
    </div>

    <div id="mod-results"></div>
  </div>

  <!-- Skripte -->
  <script>
    // --- Versionen automatisch hinzufügen ---
    const versions = [
      "1.21.10","1.21.9","1.21.8","1.21.7","1.21.6","1.21.5","1.21.4","1.21.3","1.21.2","1.21.1","1.21",
      "1.20.6","1.20.5","1.20.4","1.20.3","1.20.2","1.20.1","1.20",
      "1.19.4","1.19.3","1.19.2","1.19.1","1.19",
      "1.18.2","1.18.1","1.18",
      "1.17.1","1.17",
      "1.16.5","1.16.4","1.16.3","1.16.2","1.16.1","1.16",
      "1.15.2","1.15.1","1.15",
      "1.14.4","1.14.3","1.14.2","1.14.1","1.14",
      "1.13.2","1.13.1","1.13",
      "1.12.2","1.12.1","1.12",
      "1.11.2","1.11.1","1.11",
      "1.10.2","1.10.1","1.10",
      "1.9.4","1.9.3","1.9.2","1.9.1","1.9",
      "1.8.9","1.8.8","1.8.7","1.8.6","1.8.5","1.8.4","1.8.3","1.8.2","1.8.1","1.8",
      "1.7.10","1.7.9","1.7.8","1.7.7","1.7.6","1.7.5","1.7.4","1.7.3","1.7.2",
      "1.6.4","1.6.2","1.6.1",
      "1.5.2","1.5.1",
      "1.4.7","1.4.6","1.4.5","1.4.4","1.4.2",
      "1.3.2","1.3.1",
      "1.2.5","1.2.4","1.2.3","1.2.2","1.2.1",
      "1.1","1.0"
    ];

    const select = document.getElementById("version");
    versions.forEach(v => select.add(new Option(v, v)));

    // --- Modrinth-Suche ---
    const modInput = document.getElementById("mod-input");
    const resultsDiv = document.getElementById("mod-results");
    let debounceTimeout;

    modInput.addEventListener("input", () => {
      clearTimeout(debounceTimeout);
      const query = modInput.value.trim();
      if (query.length === 0) {
        resultsDiv.innerHTML = "";
        return;
      }
      debounceTimeout = setTimeout(() => searchModrinth(query), 300);
    });

    async function searchModrinth(query) {
      resultsDiv.innerHTML = "<div class='result'>⏳ Suche...</div>";
      try {
        const res = await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(query)}&limit=20`);
        const data = await res.json();

        if (data.hits.length === 0) {
          resultsDiv.innerHTML = "<div class='result'>Keine Mods gefunden.</div>";
          return;
        }

        resultsDiv.innerHTML = data.hits.map(mod => `
          <div class="result" onclick="selectMod('${mod.slug}', '${mod.title.replace(/'/g, "\\'")}')">
            <strong>${mod.title}</strong><br>
            <small>${mod.description ? mod.description.substring(0, 80) + "…" : "Keine Beschreibung"}</small>
          </div>
        `).join("");
      } catch (err) {
        resultsDiv.innerHTML = "<div class='result'>Fehler beim Abrufen der Daten.</div>";
      }
    }

    function selectMod(slug, title) {
      modInput.value = slug;
      resultsDiv.innerHTML = "";
    }

    async function redirectToUrl() {
      const modname = document.getElementById('mod-input').value.trim();
      const selectedVersion = document.getElementById('version').value;
      const selectedLoader = document.getElementById('modloader').value;

      if (!modname) {
        showAlert('⚠️ Bitte gib eine Mod ein!');
        return;
      }

      try {
        const projectRes = await fetch(`https://api.modrinth.com/v2/project/${modname}`);
        if (!projectRes.ok) {
          showAlert('⚠️ Mod nicht gefunden!');
          return;
        }

        const projectData = await projectRes.json();
        const versionRes = await fetch(`https://api.modrinth.com/v2/project/${modname}/version`);
        const allVersions = await versionRes.json();

        const matchingVersions = allVersions.filter(v =>
          v.game_versions.includes(selectedVersion) &&
          v.loaders.includes(selectedLoader)
        );

        if (matchingVersions.length === 0) {
          showAlert('⚠️ Die Mod existiert nicht für diese Version oder diesem Modloader!');
          return;
        }

        const latest = matchingVersions[0];
        const file = latest.files[0];
        if (!file) showAlert('⚠️ Mod-Datei wurde nicht gefunden!');

        window.open(file.url, '_blank');
      } catch (err) {
        alert("Fehler: " + err.message);
        console.error(err);
      }
    }

    function showAlert(message) {
      const alertBox = document.getElementById("alert-box");
      alertBox.textContent = message;
      alertBox.style.display = "block";
      setTimeout(() => alertBox.style.display = "none", 5000);
    }
  </script>
</body>
</html>
